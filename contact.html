<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Alan Wu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #080a0f;
      --bg2:       #0d1017;
      --surface:   #131720;
      --border:    rgba(255,255,255,0.07);
      --cyan:      #00e5ff;
      --violet:    #9b5cf6;
      --mid:       #5b8cff;
      --text:      #e8ecf4;
      --muted:     #6b7280;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Space Grotesk', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }

    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    main { flex: 1; }

    /* ── NOISE TEXTURE OVERLAY ──────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* ── NAV ────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(8,10,15,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
    }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── CONTACT ────────────────────────────────────────── */
    #contact {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10rem 3rem 5rem;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    #contact::before {
      content: 'CONTACT';
      position: absolute;
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 18rem);
      font-weight: 800;
      color: rgba(255,255,255,0.02);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: -0.05em;
    }
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .contact-heading {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .contact-sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }
    .contact-links {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .contact-link {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1.75rem;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--text);
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .contact-link:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── ANIMATIONS ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: none; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
      #contact { padding: 8rem 1.25rem 4rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">AW.DEV</a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="music.html">Music</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main>
    <section id="contact">
      <p class="section-label reveal">Contact</p>
      <h1 class="contact-heading reveal">Let's build<br/>something.</h1>
      <p class="contact-sub reveal">Open to co-op opportunities, collabs, and interesting problems.</p>
      <div class="contact-links reveal">
        <a href="mailto:alanwu.coop@gmail.com" class="contact-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email
        </a>
        <a href="https://github.com" target="_blank" class="contact-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </a>
        <a href="https://linkedin.com" target="_blank" class="contact-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
      </div>
    </section>
  </main>

  <footer>
    <span>© 2026 Alan Wu</span>
    <span>Built with HTML · CSS · JS · Hosted on GitHub Pages</span>
  </footer>

  <!-- SCRIPTS -->
  <script>
    // ── Scroll reveal ─────────────────────────────────────
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    reveals.forEach(el => observer.observe(el));

    // ── Active nav highlight ──────────────────────────────
    const page = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-links a').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !href.startsWith('#') && href === page) {
        a.style.color = 'var(--cyan)';
      }
    });
  </script>
</body>
</html>
